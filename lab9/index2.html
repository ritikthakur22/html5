<!-- wap code for manipulation of flexbox -->








<!doctype html>
<html>
<head>
     <title>Responsive Website</title>
     <style>
          .a{
            display:flex;
            flex-direction:row;
            flex-wrap:wrap;
            flex-flow:row wrap-reverse;
            background:blue;
            align-content:center;
            justify-content:center;
            align-text:center;
            align-item:flex-start;
            }
          .b{
             background:rgb(27, 222, 222);
             padding:50px;
             margin:50px;
             order:3;
             flex-grow:1;
             }
          .c{
             background:red;
             padding:50px;
             margin:50px;
             order:4;
             flex-basis:10;
             }
          .d{
             background:rgb(73, 101, 179);
             padding:50px;
             margin:50px;
             order:1;
             flex-grow:1;
             }
          .e{
             background:rgb(30, 202, 130);
             padding:50px;
             margin:50px;
             order:2;
             flex-shrink:1;
             }
     </style>
</head>
<body>




     <div class="a">
         <div class="b">Home</div>
         <div class="c">About Us</div>
         <div class="d">contact us</div>
         
     </div> 
</body>
</html>
