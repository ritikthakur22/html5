 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritik</title>
    <style>
        .container {
            width: 100px;
            height: 100px;
            display: grid;
            /* grid-template-columns: auto auto auto;
            grid-template-rows: auto auto auto; */
            grid-template-areas: "h h h h h h h h h"
                                 "l l m m m m m r r"
                                 "l l f f f f f r r";
            color: yellow;
                               
        }
        .item {
            background-color: blue;
            padding: 50px;
            margin: 10px;
        }
        #a {
            grid-area: h;
        }
        #b {
            grid-area: l;
        }
        #c {
            grid-area: m;
        }
        #d {
            grid-area: r;
        }
        #e {
            grid-area: f;
        }
        #f {
            grid-area: f;
        }
        #g {
            grid-area: f;
        }


    </style>

 </head>
 <body>
    <div class="container">
        <div id="a" class="item">1</div>
        <div id="b" class="item">2</div>
        <div id="c" class="item">3</div>
        <div id="d" class="item">4</div>
        <div id="e" class="item">5</div>
        <div id="f" class="item">6</div>
        <div id="g" class="item">7</div>
    </div>
    
 </body>
 </html>
