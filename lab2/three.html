<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Registration Form</title>
</head>

<body>

<form action="submit.php" method="post">

<fieldset>
<legend>Student Registration</legend>

<!-- Full Name -->
<label for="name">Full Name:</label><br>
<input type="text" id="name" name="name" placeholder="Enter full name" required>
<br><br>

<!-- Email with Rule -->
<label for="email">Email:</label><br>
<input type="email" id="email" name="email"
placeholder="example@gmail.com"
pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
required>
<br><br>

<!-- Password with Rule -->
<label for="pass">Password:</label><br>
<input type="password" id="pass" name="password"
pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).{8,}"
placeholder="Strong password"
title="Min 8 chars with uppercase, lowercase, number, special char"
required>
<br><br>

<!-- Telephone -->
<label for="phone">Telephone:</label><br>
<input type="tel" id="phone" name="phone"
pattern="[0-9]{10}" placeholder="10 digit number" required>
<br><br>

<!-- DOB -->
<label for="dob">Date of Birth:</label><br>
<input type="date" id="dob" name="dob" required>
<br><br>

<!-- Gender -->
<label>Gender:</label><br>
<input type="radio" name="gender" value="male" required> Male
<input type="radio" name="gender" value="female"> Female
<br><br>

<!-- Course -->
<label for="course">Course:</label><br>
<select id="course" name="course" required>
<option value="">Select</option>
<option>B.Tech</option>
<option>BCA</option>
<option>MCA</option>
</select>
<br><br>

<!-- Skills (Multi-select) -->
<label for="skills">Skills:</label><br>
<select id="skills" name="skills" multiple size="3">
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
<option>Python</option>
</select>
<br><br>

<!-- Datalist -->
<label for="browser">Preferred Browser:</label><br>
<input list="browsers" id="browser" name="browser">
<datalist id="browsers">
<option value="Chrome">
<option value="Firefox">
<option value="Edge">
<option value="Safari">
</datalist>
<br><br>

<!-- Address -->
<label for="address">Address:</label><br>
<textarea id="address" name="address" rows="4" cols="40"
placeholder="Enter full address"></textarea>
<br><br>

<!-- City, State, Zip -->
<label>City:</label>
<input type="text" name="city" required>

<label>State:</label>
<input type="text" name="state" required>

<label>Zip Code:</label>
<input type="text" name="zip" pattern="[0-9]{6}" required>
<br><br>

<!-- Upload Photo -->
<label for="photo">Upload Photo:</label><br>
<input type="file" id="photo" name="photo" accept="image/*">
<br><br>

<!-- Buttons -->
<button type="submit">Submit</button>
<button type="reset">Reset</button>

</fieldset>

</form>

</body>
</html>
