<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Portfolio</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: system-ui;
    overflow-x: hidden;
    background: black;
    color: white;
}

/* 3D canvas layer */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* content layer */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

/* hero */
.hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.hero h1 {
    font-size: clamp(2rem, 6vw, 5rem);
}

.hero p {
    opacity: 0.7;
    margin-top: 10px;
}

/* sections */
.section {
    margin-top: 80px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

.card {
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    background: rgba(255,255,255,0.1);
}

/* responsive */
@media (max-width:600px) {
    .hero h1 { font-size: 2.5rem; }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

    <section class="hero">
        <h1>Ritik</h1>
        <p>Developer • AI • Systems</p>
    </section>

    <section class="section">
        <h2>Projects</h2>
        <div class="cards">
            <div class="card">Project 1</div>
            <div class="card">Project 2</div>
            <div class="card">Project 3</div>
        </div>
    </section>

    <section class="section">
        <h2>Skills</h2>
        <div class="cards">
            <div class="card">C++</div>
            <div class="card">Web</div>
            <div class="card">Linux</div>
        </div>
    </section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const canvas = document.getElementById("bg");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({ canvas });
renderer.setSize(window.innerWidth, window.innerHeight);

// particles (galaxy)
const geometry = new THREE.BufferGeometry();
const vertices = [];

for (let i = 0; i < 3000; i++) {
    vertices.push(
        (Math.random() - 0.5) * 800,
        (Math.random() - 0.5) * 800,
        (Math.random() - 0.5) * 800
    );
}

geometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(vertices, 3)
);

const material = new THREE.PointsMaterial({
    color: 0x88ccff,
    size: 1.5
});

const stars = new THREE.Points(geometry, material);
scene.add(stars);

camera.position.z = 200;

// mouse interaction
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// animation
function animate() {
    requestAnimationFrame(animate);

    stars.rotation.y += 0.0008;
    stars.rotation.x += 0.0003;

    camera.position.x += (mouseX * 20 - camera.position.x) * 0.02;
    camera.position.y += (-mouseY * 20 - camera.position.y) * 0.02;

    camera.lookAt(scene.position);

    renderer.render(scene, camera);
}

animate();

// responsive fix
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
